<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>생성 완료 - DongDong Clinic</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary: #3b82f6;
            --accent: #06b6d4;
            --text-main: #f8fafc;
            --text-secondary: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Pretendard', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            width: 90%;
            max-width: 1200px;
            height: 80vh;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Left Section: Preview */
        .preview-section {
            flex: 1.2;
            background: rgba(0, 0, 0, 0.2);
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        .preview-label {
            align-self: flex-start;
            margin-bottom: 20px;
            font-size: 14px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
        }

        .preview-container {
            width: 100%;
            height: 100%;
            overflow-y: auto;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            scrollbar-width: thin;
            scrollbar-color: var(--primary) transparent;
        }

        .preview-container::-webkit-scrollbar {
            width: 6px;
        }

        .preview-container::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 10px;
        }

        .preview-container img {
            width: 100%;
            display: block;
        }

        /* Right Section: Actions */
        .action-section {
            flex: 0.8;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        h1 {
            font-size: 42px;
            margin: 0 0 10px 0;
            background: linear-gradient(to right, #60a5fa, #2dd4bf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 18px;
            color: var(--text-secondary);
            margin-bottom: 50px;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .btn {
            padding: 20px 30px;
            border-radius: 15px;
            font-size: 18px;
            font-weight: 700;
            text-align: center;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(37, 99, 235, 0.5);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-3px);
        }

        .info-card {
            margin-top: 40px;
            padding: 20px;
            background: rgba(59, 130, 246, 0.1);
            border-radius: 15px;
            border: 1px solid rgba(59, 130, 246, 0.2);
            font-size: 14px;
            color: #93c5fd;
        }

        @media (max-width: 900px) {
            .container {
                flex-direction: column;
                height: auto;
                margin: 20px 0;
            }

            .preview-section {
                flex: none;
                height: 400px;
                padding: 20px;
                border-right: none;
                border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            }

            .action-section {
                padding: 40px 20px;
            }

            h1 {
                font-size: 32px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Left Section -->
        <div class="preview-section">
            <div class="preview-label">Live Preview</div>
            <div class="preview-container">
                <img src="/static/previews/{{ job_id }}.png" alt="Report Preview">
            </div>
        </div>

        <!-- Right Section -->
        <div class="action-section">
            <h1>모든 리포트가<br>생성되었습니다.</h1>
            <p class="subtitle">모든 리포트를 안전하게 압축했습니다.</p>

            <div class="btn-group">
                <a href="/download_job/{{ job_id }}" class="btn btn-primary">ZIP 파일 다운로드 (.zip)</a>
                <a href="/" class="btn btn-secondary">다른 엑셀파일 파싱하기</a>
            </div>

            <div class="info-card">
                💡 <b>보안 안내:</b> 생성된 리포트와 압축 파일은 서버의 자원 보호를 위해 <b>10분 후 자동으로 영구 삭제</b>됩니다. 지금 바로 다운로드해 주세요.
            </div>
        </div>
    </div>
</body>

</html>
