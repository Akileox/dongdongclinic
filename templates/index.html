<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>Student Learning Report Generator</title>
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        /* Web App Specific Overrides */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            margin: 0;
            background-color: var(--bg-dark);
            overflow: hidden;
        }

        .web-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 600px;
            padding: 20px;
        }

        .upload-card {
            text-align: center;
            padding: 60px 40px;
        }

        .upload-box {
            display: block;
            border: 2px dashed rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            padding: 50px 20px;
            margin: 30px 0;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.02);
            width: 100%;
            box-sizing: border-box;
        }

        .upload-box:hover {
            border-color: #00FFFF;
            background: rgba(0, 255, 255, 0.05);
        }

        .upload-box p {
            font-size: 18px;
            color: var(--text-secondary);
            margin: 0 0 15px 0;
        }

        .file-input {
            display: none;
        }

        .btn {
            background: linear-gradient(90deg, #0066FF, #00FFFF);
            color: #000;
            border: none;
            padding: 16px 40px;
            font-size: 18px;
            font-weight: 700;
            border-radius: 100px;
            cursor: pointer;
            transition: opacity 0.3s;
            width: 100%;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .flash-messages {
            list-style: none;
            padding: 0;
            margin-bottom: 20px;
        }

        .flash-error {
            color: #FF6666;
            background: rgba(255, 102, 102, 0.1);
            padding: 12px;
            border-radius: 8px;
            font-size: 15px;
        }

        #loader {
            display: none;
            margin-top: 30px;
            width: 100%;
        }

        .progress-container {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 100px;
            height: 12px;
            margin-bottom: 15px;
            overflow: hidden;
        }

        #progressBar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #0066FF, #00FFFF);
            transition: width 0.3s ease;
        }

        #statusText {
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>
    <div class="glow-bg top-left" style="width:100vw; height:100vh; top:-50vh; left:-20vw;"></div>

    <div class="web-container">
        <div class="card upload-card">
            <h1 class="brand-logo" style="font-size: 40px; margin-bottom: 10px;">TeamDJ</h1>
            <div class="subtitle" style="font-size: 20px; margin-bottom: 30px;">학습 리포트 일괄 생성기</div>

            <div id="errorBox" class="flash-error" style="display: none; margin-bottom: 20px;"></div>

            <form id="uploadForm" enctype="multipart/form-data">
                <label class="upload-box" id="dropZone">
                    <p>엑셀 파일(.xlsx)을 이곳으로 드래그 하거나 클릭하세요</p>
                    <p id="fileNameDisplay"
                        style="color: #fff; font-weight: bold; font-size: 20px; margin-top:20px; display:none;"></p>
                    <input type="file" name="file" class="file-input" id="fileInput" accept=".xlsx, .xls" required>
                </label>

                <button type="submit" class="btn" id="submitBtn">리포트 생성 시작</button>

                <div id="loader">
                    <div id="statusText">서버 연결 중...</div>
                    <div class="progress-container">
                        <div id="progressBar"></div>
                    </div>
                    <div style="color: #00FFFF; font-size: 13px;">페이지를 나가지 마세요. 완료 시 자동 다운로드됩니다.</div>
                </div>
            </form>
        </div>
    </div>

    <script>
        const form = document.getElementById('uploadForm');
        const input = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const display = document.getElementById('fileNameDisplay');
        const submitBtn = document.getElementById('submitBtn');
        const loader = document.getElementById('loader');
        const progressBar = document.getElementById('progressBar');
        const statusText = document.getElementById('statusText');
        const errorBox = document.getElementById('errorBox');

        input.addEventListener('change', function (e) {
            if (this.files && this.files.length > 0) {
                display.style.display = 'block';
                display.textContent = this.files[0].name;
            }
        });

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '#00FFFF';
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.style.borderColor = 'rgba(255,255,255,0.3)';
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = 'rgba(255,255,255,0.3)';
            if (e.dataTransfer.files.length > 0) {
                input.files = e.dataTransfer.files;
                display.style.display = 'block';
                display.textContent = input.files[0].name;
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            errorBox.style.display = 'none';
            submitBtn.style.display = 'none';
            loader.style.display = 'block';
            statusText.textContent = '파일 업로드 중...';

            const formData = new FormData(form);

            try {
                const response = await fetch('/', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    const jobId = data.job_id;
                    pollStatus(jobId);
                } else {
                    throw new Error(data.error || '업로드 실패');
                }
            } catch (err) {
                errorBox.textContent = err.message;
                errorBox.style.display = 'block';
                submitBtn.style.display = 'block';
                loader.style.display = 'none';
            }
        });

        function pollStatus(jobId) {
            const interval = setInterval(async () => {
                try {
                    const response = await fetch(`/status/${jobId}`);

                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }

                    const contentType = response.headers.get("content-type");
                    if (!contentType || !contentType.includes("application/json")) {
                        throw new TypeError("Oops, we haven't got JSON!");
                    }

                    const data = await response.json();

                    if (data.error) {
                        clearInterval(interval);
                        alert('작업 중 오류 발생: ' + (data.status || '알 수 없는 오류'));
                        location.reload();
                        return;
                    }

                    progressBar.style.width = data.percent + '%';
                    statusText.textContent = data.status;

                    if (data.percent === 100) {
                        clearInterval(interval);
                        statusText.textContent = '생성 완료! 다운로드를 시작합니다.';
                        window.location.href = `/download_job/${jobId}`;

                        // 다시 시작할 수 있도록 UI 복구 (선택 사항)
                        setTimeout(() => {
                            submitBtn.style.display = 'block';
                            loader.style.display = 'none';
                            progressBar.style.width = '0%';
                        }, 5000);
                    }
                } catch (err) {
                    console.error('Status polling error:', err);
                }
            }, 2000);
        }
    </script>
</body>

</html>
